<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Village Sim</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; font-family: system-ui, sans-serif; }
      #app { display: flex; width: 100vw; height: 100vh; }
      #side-pane { flex: 0 0 30%; min-width: 280px; background: #16181d; color: #f0f0f0; display: flex; flex-direction: column; border-right: 1px solid #2a2d34; }
      #clock-mount { flex: 0 0 auto; }
      #todo-pane { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
      #account-mount { flex: 0 0 auto; }

      .account-bar { padding: 8px 12px; border-top: 1px solid #2a2d34; background: #1c1f26; font-size: 12px; color: #8a8f99; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .account-id { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .account-action { background: transparent; color: #8a8f99; border: 1px solid #2a2d34; border-radius: 3px; font-size: 11px; font-family: inherit; padding: 3px 8px; cursor: pointer; white-space: nowrap; }
      .account-action:hover { color: #f0f0f0; border-color: #38875e; }
      .account-form { padding: 8px 12px; border-top: 1px solid #2a2d34; background: #1c1f26; display: flex; flex-direction: column; gap: 6px; }
      .account-form input { padding: 5px 8px; background: #0e1014; color: #f0f0f0; border: 1px solid #2a2d34; border-radius: 4px; font-size: 13px; font-family: inherit; }
      .account-form-row { display: flex; gap: 6px; }
      .account-form-row button { flex: 1; padding: 5px 8px; border: none; border-radius: 4px; font-size: 12px; font-family: inherit; cursor: pointer; }
      .account-submit { background: #2d6a4f; color: #fff; }
      .account-submit:hover { background: #38875e; }
      .account-cancel { background: #2a2d34; color: #f0f0f0; }
      .account-error { font-size: 11px; color: #ff5555; }
      .account-toggle { background: none; border: none; color: #8a8f99; font-size: 11px; cursor: pointer; text-decoration: underline; padding: 0; }
      .account-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
      .account-modal { width: 340px; max-width: 90vw; background: #1c1f26; color: #f0f0f0; border: 1px solid #2a2d34; border-radius: 8px; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
      .account-modal-header { display: flex; align-items: center; justify-content: space-between; }
      .account-modal-title { font-size: 16px; font-weight: 600; }
      .account-modal-close { background: transparent; border: none; color: #8a8f99; font-size: 16px; cursor: pointer; padding: 0 4px; }
      .account-modal-close:hover { color: #f0f0f0; }
      .account-modal-email { font-size: 14px; color: #f0f0f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .account-modal-section, .account-modal-danger { display: flex; flex-direction: column; gap: 6px; }
      .account-modal-danger { border-top: 1px solid #2a2d34; padding-top: 12px; }
      .account-modal-section-label { font-size: 12px; color: #8a8f99; text-transform: uppercase; letter-spacing: 1px; }
      .account-modal input { padding: 6px 8px; background: #0e1014; color: #f0f0f0; border: 1px solid #2a2d34; border-radius: 4px; font-size: 13px; font-family: inherit; }
      .account-modal-pwd-submit { padding: 6px 8px; background: #2d6a4f; color: #fff; border: none; border-radius: 4px; font-size: 12px; font-family: inherit; cursor: pointer; }
      .account-modal-pwd-submit:hover { background: #38875e; }
      .account-modal-pwd-submit:disabled { opacity: 0.5; cursor: default; }
      .account-modal-pwd-error { font-size: 11px; color: #ff5555; }
      .account-modal-pwd-error.account-modal-ok { color: #38875e; }
      .account-modal-sync { font-size: 13px; color: #8a8f99; }
      .account-modal-delete { padding: 6px 8px; background: transparent; color: #ff5555; border: 1px solid #5a2d2d; border-radius: 4px; font-size: 12px; font-family: inherit; cursor: pointer; }
      .account-modal-delete:hover { border-color: #ff5555; }
      .account-modal-delete-armed { background: #ff5555; color: #fff; }
      .account-modal-delete-error { font-size: 11px; color: #ff5555; }
      #game { flex: 1 1 auto; min-width: 0; }

      .clock-bar { padding: 16px 16px 12px; border-bottom: 1px solid #2a2d34; background: linear-gradient(180deg, #1c1f26 0%, #16181d 100%); text-align: center; }
      .clock-time { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 38px; font-weight: 600; letter-spacing: 2px; color: #f0f0f0; line-height: 1; font-variant-numeric: tabular-nums; }
      .clock-meta { margin-top: 6px; font-size: 12px; color: #8a8f99; text-transform: uppercase; letter-spacing: 1px; }
      .clock-stats { padding: 8px 16px; font-size: 12px; color: #8a8f99; text-align: center; border-bottom: 1px solid #2a2d34; }
      .clock-stats.goal-reached { color: #38875e; }
      .clock-goal { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 2px; }
      .clock-goal:hover { color: #f0f0f0; }
      .clock-goal-edit { width: 42px; background: #0e1014; color: #f0f0f0; border: 1px solid #38875e; border-radius: 3px; font-size: 12px; font-family: inherit; text-align: center; }

      .todo-sidebar { display: flex; flex-direction: column; height: 100%; padding: 12px; box-sizing: border-box; }
      .todo-header { display: flex; gap: 6px; margin-bottom: 10px; }
      .todo-input { flex: 1; padding: 6px 8px; background: #0e1014; color: #f0f0f0; border: 1px solid #2a2d34; border-radius: 4px; font-size: 14px; }
      .todo-add { width: 32px; background: #2d6a4f; color: #fff; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; }
      .todo-add:hover { background: #38875e; }
      .todo-list { list-style: none; margin: 0; padding: 0; flex: 1; overflow-y: auto; }
      .todo-item { display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid #1f2128; }
      .todo-item.done .todo-label { text-decoration: line-through; opacity: 0.5; }
      .todo-label { flex: 1; cursor: text; user-select: none; font-size: 14px; }
      .todo-edit { flex: 1; padding: 4px 6px; background: #0e1014; color: #f0f0f0; border: 1px solid #38875e; border-radius: 3px; font-size: 14px; font-family: inherit; }
      .todo-delete { background: transparent; color: #888; border: none; cursor: pointer; font-size: 18px; padding: 0 4px; }
      .todo-delete:hover { color: #ff5555; }
      .todo-check { cursor: pointer; }
      .todo-sort-row { margin-bottom: 8px; }
      .todo-sort { width: 100%; padding: 5px 8px; background: #0e1014; color: #f0f0f0; border: 1px solid #2a2d34; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer; }
      .todo-section { margin-top: 8px; flex: 0 0 auto; }
      .todo-section-header { padding: 6px 4px; font-size: 13px; color: #888; cursor: pointer; user-select: none; border-top: 1px solid #1f2128; }
      .todo-section-header:hover { color: #f0f0f0; }
      .todo-done-list { flex: 0 0 auto; }
      .todo-section.collapsed .todo-done-list { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="side-pane">
        <div id="clock-mount"></div>
        <div id="todo-pane"></div>
        <div id="account-mount"></div>
      </div>
      <div id="game"></div>
    </div>
    <div id="modal-mount"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
